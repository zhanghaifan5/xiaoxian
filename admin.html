<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八卦占卜 · 数据面板（在线）</title>
<style>
  :root {
    --bg: #0d0c09;
    --card: #1a1712;
    --bronze: #8b7d5a;
    --gold: #c9a84c;
    --gold-light: #e8d38c;
    --text: #d8cfb8;
    --text-dim: #8a8068;
    --border: #2e2820;
    --accent: #8b3a1a;
    --jade: #5a8a6a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:"Microsoft YaHei","Noto Serif SC",sans-serif; padding:20px; min-height:100vh; }
  .container { max-width:1000px; margin:0 auto; }
  h1 { text-align:center; color:var(--gold); margin:20px 0 8px; font-size:28px; letter-spacing:4px; }
  .subtitle { text-align:center; color:var(--text-dim); font-size:13px; margin-bottom:20px; }
  .nav { text-align:center; margin:16px 0; display:flex; gap:12px; justify-content:center; align-items:center; }
  .nav a, .nav button { color:var(--bronze); text-decoration:none; font-size:13px; background:transparent; border:1px solid var(--border); padding:6px 16px; border-radius:6px; cursor:pointer; font-family:inherit; transition:all .3s; }
  .nav a:hover, .nav button:hover { color:var(--gold); border-color:var(--gold); }
  .nav .active { background:rgba(200,168,76,0.12); border-color:var(--gold); color:var(--gold); }

  .empty { text-align:center; color:var(--text-dim); padding:60px 20px; }
  .empty .icon { font-size:48px; margin-bottom:12px; }

  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:24px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:18px; text-align:center; transition:all .3s; }
  .card:hover { border-color:var(--bronze); }
  .card .num { font-size:34px; color:var(--gold-light); font-weight:bold; }
  .card .label { font-size:12px; color:var(--text-dim); margin-top:4px; }
  .card .sub { font-size:11px; color:#5a5040; margin-top:2px; }

  .section { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:16px; }
  .section h2 { color:var(--gold); font-size:15px; margin-bottom:14px; border-bottom:1px solid var(--border); padding-bottom:8px; letter-spacing:2px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { padding:8px 12px; text-align:left; border-bottom:1px solid var(--border); }
  th { color:var(--text-dim); font-weight:normal; font-size:12px; }
  td { color:var(--text); }
  .bar-wrap { display:flex; align-items:center; gap:8px; }
  .bar { height:16px; background:linear-gradient(90deg,var(--bronze-dark),var(--bronze)); border-radius:4px; min-width:4px; transition:width .5s; }
  .bar-count { font-size:12px; color:var(--text-dim); white-space:nowrap; }

  .recent { max-height:500px; overflow-y:auto; }
  .recent::-webkit-scrollbar { width:6px; }
  .recent::-webkit-scrollbar-thumb { background:var(--bronze-dark); border-radius:3px; }

  .note { text-align:center; color:var(--text-dim); font-size:11px; margin-top:30px; padding:10px; }
  .loading { text-align:center; padding:60px; color:var(--text-dim); }
  .loading .spinner { display:inline-block; width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .time-filter { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
  .time-filter select { background:#111; border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:6px; font-family:inherit; font-size:13px; }

  .row { display:flex; gap:16px; flex-wrap:wrap; }
  .col { flex:1; min-width:280px; }
</style>
</head>
<body>
<div class="container">
<h1>☯ 八卦占卜 · 在线数据面板</h1>
<div class="subtitle">所有用户数据汇总（Supabase 云端）</div>
<div class="nav">
  <button onclick="refresh()" class="active" id="refreshBtn">🔄 刷新数据</button>
  <a href="index.html">🏠 返回首页</a>
</div>
<div id="app"><div class="loading"><div class="spinner"></div><p>正在从云端加载数据...</p></div></div>
<div class="note">📡 数据存储在 Supabase 云端，展示所有用户的占卜记录</div>
</div>

<script>
const SUPABASE_URL = 'https://vaxqenkobsflatavmpta.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2jhVpFm1-1XsGTggIaGzog_m4l1Zihf';

async function supabaseQuery(table, select, opts) {
  let url = SUPABASE_URL + '/rest/v1/' + table + '?select=' + encodeURIComponent(select);
  if (opts && opts.order) url += '&order=' + encodeURIComponent(opts.order);
  if (opts && opts.limit) url += '&limit=' + opts.limit;
  const resp = await fetch(url, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  if (!resp.ok) throw new Error('Query failed: ' + resp.status);
  return resp.json();
}

async function refresh() {
  const app = document.getElementById('app');
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 加载中...';
  app.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在从云端加载数据...</p></div>';

  try {
    const [visits, divinations] = await Promise.all([
      supabaseQuery('visits', '*', { order: 'time.desc', limit: 5000 }),
      supabaseQuery('divinations', '*', { order: 'time.desc', limit: 5000 })
    ]);
    render(visits || [], divinations || []);
  } catch(e) {
    app.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>加载失败</p><p style="font-size:12px;">' + e.message + '</p></div>';
  }
  btn.disabled = false;
  btn.textContent = '🔄 刷新数据';
}

function render(visits, divinations) {
  const app = document.getElementById('app');

  if (visits.length === 0 && divinations.length === 0) {
    app.innerHTML = '<div class="empty"><div class="icon">📭</div><p>暂无数据</p><p style="font-size:12px;margin-top:8px;">用户开始占卜后，数据会自动出现在这里</p></div>';
    return;
  }

  // 统计
  const sessions = new Set();
  visits.forEach(v => sessions.add(v.session_id));
  divinations.forEach(d => sessions.add(d.session_id));

  const browsers = {}, devices = {}, oses = {};
  visits.forEach(v => {
    browsers[v.browser] = (browsers[v.browser]||0)+1;
    devices[v.device] = (devices[v.device]||0)+1;
    oses[v.os] = (oses[v.os]||0)+1;
  });

  const guaCounts = {}, methodCounts = {};
  divinations.forEach(d => {
    if (d.ben_gua_name) guaCounts[d.ben_gua_name] = (guaCounts[d.ben_gua_name]||0)+1;
    if (d.method) methodCounts[d.method] = (methodCounts[d.method]||0)+1;
  });

  const topGua = Object.entries(guaCounts).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const maxGua = topGua.length ? topGua[0][1] : 1;

  let html = '';

  // 概览卡片
  html += '<div class="cards">';
  html += `<div class="card"><div class="num">${visits.length}</div><div class="label">总访问次数</div></div>`;
  html += `<div class="card"><div class="num">${sessions.size}</div><div class="label">独立用户数</div></div>`;
  html += `<div class="card"><div class="num">${divinations.length}</div><div class="label">总占卜次数</div></div>`;
  const avgPerUser = sessions.size ? (divinations.length / sessions.size).toFixed(1) : '0';
  html += `<div class="card"><div class="num">${avgPerUser}</div><div class="label">人均占卜次数</div></div>`;
  html += '</div>';

  html += '<div class="row">';

  // 浏览器
  html += '<div class="col"><div class="section"><h2>🌐 浏览器分布</h2><table>';
  const browserSorted = Object.entries(browsers).sort((a,b)=>b[1]-a[1]);
  const maxBrowser = browserSorted.length ? browserSorted[0][1] : 1;
  browserSorted.forEach(([k,v])=>{
    html += `<tr><td>${k}</td><td><div class="bar-wrap"><div class="bar" style="width:${Math.max(20,(v/maxBrowser)*120)}px"></div><span class="bar-count">${v}次</span></div></td></tr>`;
  });
  html += '</table></div></div>';

  // 设备
  html += '<div class="col"><div class="section"><h2>📱 设备类型</h2><table>';
  const devSorted = Object.entries(devices).sort((a,b)=>b[1]-a[1]);
  const maxDev = devSorted.length ? devSorted[0][1] : 1;
  devSorted.forEach(([k,v])=>{
    html += `<tr><td>${k}</td><td><div class="bar-wrap"><div class="bar" style="width:${Math.max(20,(v/maxDev)*120)}px"></div><span class="bar-count">${v}次</span></div></td></tr>`;
  });
  html += '</table></div></div>';

  html += '</div>';

  // 操作系统
  html += '<div class="section"><h2>💻 操作系统</h2><table>';
  const osSorted = Object.entries(oses).sort((a,b)=>b[1]-a[1]);
  const maxOs = osSorted.length ? osSorted[0][1] : 1;
  osSorted.forEach(([k,v])=>{
    html += `<tr><td>${k}</td><td><div class="bar-wrap"><div class="bar" style="width:${Math.max(20,(v/maxOs)*300)}px"></div><span class="bar-count">${v}次</span></div></td></tr>`;
  });
  html += '</table></div>';

  // 热门卦象
  if (topGua.length) {
    html += '<div class="section"><h2>🏆 热门卦象排行</h2><table>';
    topGua.forEach(([k,v],i)=>{
      html += `<tr><td>${i+1}</td><td style="color:var(--gold-light)">${k}</td><td><div class="bar-wrap"><div class="bar" style="width:${Math.max(16,(v/maxGua)*200)}px"></div><span class="bar-count">${v}次</span></div></td></tr>`;
    });
    html += '</table></div>';
  }

  // 占卜方法
  if (Object.keys(methodCounts).length) {
    html += '<div class="section"><h2>🎯 占卜方法偏好</h2><table>';
    const methodNames = {shicao:'🌿 大衍蓍草',coin:'🪙 三钱代蓍',meihua:'🌸 梅花易数'};
    const methodSorted = Object.entries(methodCounts).sort((a,b)=>b[1]-a[1]);
    const maxMethod = methodSorted.length ? methodSorted[0][1] : 1;
    methodSorted.forEach(([k,v])=>{
      html += `<tr><td>${methodNames[k]||k}</td><td><div class="bar-wrap"><div class="bar" style="width:${Math.max(20,(v/maxMethod)*180)}px"></div><span class="bar-count">${v}次 (${((v/divinations.length)*100).toFixed(0)}%)</span></div></td></tr>`;
    });
    html += '</table></div>';
  }

  // 最近占卜记录
  if (divinations.length) {
    html += '<div class="section"><h2>📋 最近占卜记录</h2><div class="recent"><table>';
    html += '<tr><th>时间</th><th>卦象</th><th>方法</th><th>动爻</th><th>问题</th></tr>';
    const methodNames = {shicao:'蓍草',coin:'铜钱',meihua:'梅花'};
    divinations.slice(0, 100).forEach(d=>{
      const question = d.question ? (d.question.length > 15 ? d.question.slice(0,15)+'...' : d.question) : '-';
      html += `<tr>
        <td style="white-space:nowrap">${(d.time||'').slice(0,16)}</td>
        <td style="color:var(--gold-light)">${d.ben_gua_name||'?'}</td>
        <td>${methodNames[d.method]||d.method||''}</td>
        <td>${d.changing_lines||'无'}</td>
        <td style="color:var(--text-dim);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.question||''}">${question}</td>
      </tr>`;
    });
    html += '</table></div></div>';
  }

  // 最近访问
  if (visits.length) {
    html += '<div class="section"><h2>🌍 最近访问记录</h2><div class="recent"><table>';
    html += '<tr><th>时间</th><th>浏览器</th><th>系统</th><th>设备</th><th>屏幕</th><th>来源</th></tr>';
    visits.slice(0, 50).forEach(v=>{
      html += `<tr>
        <td style="white-space:nowrap">${(v.time||'').slice(0,16)}</td>
        <td>${v.browser||''}</td>
        <td>${v.os||''}</td>
        <td>${v.device||''}</td>
        <td>${v.screen_size||''}</td>
        <td style="color:var(--text-dim);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${v.referrer||''}">${(v.referrer||'direct').slice(0,30)}</td>
      </tr>`;
    });
    html += '</table></div></div>';
  }

  app.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', refresh);
</script>
</body>
</html>

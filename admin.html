<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八卦占卜 · 数据面板</title>
<style>
  :root {
    --bg: #0d0c09;
    --card: #1a1712;
    --bronze: #8b7d5a;
    --gold: #c9a84c;
    --gold-light: #e8d38c;
    --text: #d8cfb8;
    --text-dim: #8a8068;
    --border: #2e2820;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:"Microsoft YaHei","Noto Serif SC",sans-serif; padding:20px; min-height:100vh; }
  h1 { text-align:center; color:var(--gold); margin:20px 0; font-size:24px; }
  .empty { text-align:center; color:var(--text-dim); padding:60px 20px; }
  .empty .icon { font-size:48px; margin-bottom:12px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; text-align:center; }
  .card .num { font-size:36px; color:var(--gold-light); font-weight:bold; }
  .card .label { font-size:13px; color:var(--text-dim); margin-top:4px; }
  .section { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; }
  .section h2 { color:var(--gold); font-size:16px; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:8px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { padding:6px 10px; text-align:left; border-bottom:1px solid var(--border); }
  th { color:var(--text-dim); font-weight:normal; }
  td { color:var(--text); }
  .bar { display:inline-block; height:14px; background:var(--bronze); border-radius:3px; min-width:4px; }
  .nav { text-align:center; margin:16px 0; }
  .nav a { color:var(--gold); text-decoration:none; font-size:14px; margin:0 8px; }
  .nav a:hover { color:var(--gold-light); }
  .recent { max-height:400px; overflow-y:auto; }
  .note { text-align:center; color:var(--text-dim); font-size:12px; margin-top:30px; padding:10px; }
</style>
</head>
<body>
<h1>☯ 八卦占卜 · 数据面板</h1>
<div class="nav">
  <a href="javascript:location.reload()">🔄 刷新</a> |
  <a href="index.html">🏠 返回首页</a> |
  <a href="javascript:if(confirm('确定清空所有数据？')){localStorage.removeItem('bagua_tracker_data');location.reload();}">🗑 清空数据</a>
</div>
<div id="app"><div class="empty"><div class="icon">📊</div>加载中...</div></div>
<div class="note">⚠ 数据存储在您浏览器的 localStorage 中，不会被上传到任何服务器。<br>清空浏览器缓存会导致数据丢失。</div>

<script>
(function() {
  const STORAGE_KEY = 'bagua_tracker_data';

  function loadData() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {visits:[],divinations:[],leaves:[]}; }
    catch(e) { return {visits:[],divinations:[],leaves:[]}; }
  }

  function render() {
    const data = loadData();
    const visits = data.visits || [];
    const divinations = data.divinations || [];
    const leaves = data.leaves || [];

    if (visits.length === 0 && divinations.length === 0) {
      document.getElementById('app').innerHTML = '<div class="empty"><div class="icon">📭</div><p>暂无数据</p><p style="font-size:12px;margin-top:8px;">打开首页进行占卜后，数据会出现在这里</p></div>';
      return;
    }

    // 统计
    const sessions = new Set();
    visits.forEach(v => sessions.add(v.session_id));
    const browsers = {}, devices = {}, oses = {};
    visits.forEach(v => {
      browsers[v.browser] = (browsers[v.browser]||0)+1;
      devices[v.device] = (devices[v.device]||0)+1;
      oses[v.os] = (oses[v.os]||0)+1;
    });
    const guaCounts = {}, methodCounts = {};
    divinations.forEach(d => {
      guaCounts[d.ben_gua_name] = (guaCounts[d.ben_gua_name]||0)+1;
      methodCounts[d.method] = (methodCounts[d.method]||0)+1;
    });
    const topGua = Object.entries(guaCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
    let totalDuration = 0, durCount = 0;
    leaves.forEach(l => { if(l.duration_seconds>0&&l.duration_seconds<86400){totalDuration+=l.duration_seconds;durCount++;} });
    const avgDur = durCount ? Math.round(totalDuration/durCount) : 0;

    let html = '';

    html += '<div class="cards">';
    html += `<div class="card"><div class="num">${visits.length}</div><div class="label">总访问次数</div></div>`;
    html += `<div class="card"><div class="num">${sessions.size}</div><div class="label">独立会话数</div></div>`;
    html += `<div class="card"><div class="num">${divinations.length}</div><div class="label">总占卜次数</div></div>`;
    html += `<div class="card"><div class="num">${avgDur}秒</div><div class="label">平均停留时长</div></div>`;
    html += '</div>';

    html += '<div class="section"><h2>🌐 浏览器分布</h2><table>';
    Object.entries(browsers).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{html+=`<tr><td>${k}</td><td>${v}次</td></tr>`;});
    html += '</table></div>';

    html += '<div class="section"><h2>💻 操作系统</h2><table>';
    Object.entries(oses).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{html+=`<tr><td>${k}</td><td>${v}次</td></tr>`;});
    html += '</table></div>';

    html += '<div class="section"><h2>📱 设备类型</h2><table>';
    Object.entries(devices).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{html+=`<tr><td>${k}</td><td>${v}次</td></tr>`;});
    html += '</table></div>';

    if (topGua.length) {
      html += '<div class="section"><h2>🏆 热门卦象 Top 10</h2><table>';
      topGua.forEach(([k,v],i)=>{html+=`<tr><td>${i+1}</td><td>${k}</td><td>${v}次</td></tr>`;});
      html += '</table></div>';
    }

    if (Object.keys(methodCounts).length) {
      html += '<div class="section"><h2>🎯 占卜方法</h2><table>';
      const methodNames = {shicao:'大衍蓍草',coin:'三钱代蓍',meihua:'梅花易数'};
      Object.entries(methodCounts).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{html+=`<tr><td>${methodNames[k]||k}</td><td>${v}次</td></tr>`;});
      html += '</table></div>';
    }

    if (divinations.length) {
      html += '<div class="section"><h2>📋 最近占卜记录</h2><div class="recent"><table>';
      html += '<tr><th>时间</th><th>卦象</th><th>方法</th><th>动爻</th></tr>';
      const methodNames = {shicao:'蓍草',coin:'铜钱',meihua:'梅花'};
      [...divinations].reverse().slice(0,50).forEach(d=>{
        html += `<tr><td>${d.time||''}</td><td>${d.ben_gua_name||''}</td><td>${methodNames[d.method]||d.method||''}</td><td>${d.changing_lines||'无'}</td></tr>`;
      });
      html += '</table></div></div>';
    }

    document.getElementById('app').innerHTML = html;
  }

  document.addEventListener('DOMContentLoaded', render);
})();
</script>
</body>
</html>
